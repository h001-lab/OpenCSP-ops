apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lago-postgresql
  namespace: lago
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: postgresql
      version: "18.5.6"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: lago-chart-values
      valuesKey: postgresql-values.yaml
  values:
    primary:
      persistence:
        enabled: true
        size: 8Gi
