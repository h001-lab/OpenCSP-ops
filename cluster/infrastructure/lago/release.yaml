apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lago
  namespace: lago
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: lago
      version: "1.27.1" # 최신 버전 확인 필요
      sourceRef:
        kind: HelmRepository
        name: lago
        namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: lago-secrets
      valuesKey: values.yaml

  values:
    lago:
      apiUrl: "https://lago-api.avgmax.team"
      frontUrl: "https://lago.avgmax.team"

    front:
      service:
        type: ClusterIP
        port: 80
      ingress:
        enabled: false # 별도 ingress.yaml로 관리

    api:
      service:
        type: ClusterIP
        port: 3000
      ingress:
        enabled: false # 별도 ingress.yaml로 관리

    postgresql:
      enabled: true
      auth:
        username: lago
        database: lago

    redis:
      enabled: true
      auth:
        enabled: false
