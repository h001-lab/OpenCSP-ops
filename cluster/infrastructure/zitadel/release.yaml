apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: zitadel
      version: "9.26.0"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: flux-system
    - name: zitadel-postgresql
      namespace: zitadel
  valuesFrom:
    - kind: Secret
      name: zitadel-secrets
      valuesKey: values.yaml

  values:
    zitadel:
      configmapConfig:
        ExternalDomain: zitadel.avgmax.team
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
        Database:
          Postgres:
            Host: zitadel-postgresql
            Port: 5432
            Database: zitadel
            MaxOpenConns: 20
            MaxIdleConns: 10
            MaxConnLifetime: 30m
            MaxConnIdleTime: 5m
            User:
              Username: zitadel
              SSL:
                Mode: disable
            Admin:
              Username: postgres
              SSL:
                Mode: disable
    service:
      type: NodePort
      protocol: grpc
      appProtocol: kubernetes.io/h2c
    postgresql:
      enabled: false
