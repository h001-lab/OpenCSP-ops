---
- name: Ops Cluster Provisioning
  hosts: k3s_nodes
  become: true
  vars:
    k3s_version: "v1.30.5+k3s1"
    netbird_setup_key: "{{ lookup('env', 'NETBIRD_KEY') }}"
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}" # contents write 권한 필요

  roles:
    - role: opencsp.k3s_node.common
    # - role: opencsp.k3s_node.netbird # (Optional) Netbird를 사용하지 않을 경우 주석 처리
    - role: opencsp.k3s_node.k3s
    - role: opencsp.k3s_node.cilium_prep
    - role: opencsp.k3s_node.cilium
    - role: opencsp.k3s_node.flux_bootstrap
      vars:
        github_user: "h001-lab"
        github_repo: "OpenCSP-core"
        flux_path: "./cluster"
        github_token: "{{ github_token }}"

- name: Wait for VM to be ready
  hosts: test_vms
  gather_facts: false
  tasks:
    - name: Wait for SSH connection
      wait_for_connection:
        delay: 10
        timeout: 300

    - name: Wait for cloud-init to complete
      raw: cloud-init status --wait
      register: cloud_init_result
      failed_when: cloud_init_result.rc not in [0, 2]
      changed_when: false

- name: VMs Provisioning
  hosts: test_vms
  become: true
  vars:
    teleport_version: "17"
    teleport_proxy_addr: "{{ TELEPORT_PROXY_ADDR }}"
    teleport_auth_token: "{{ TELEPORT_JOIN_TOKEN }}"
    teleport_node_name: "{{ node_name }}"
    teleport_labels: {}

  roles:
    - role: opencsp.client_vm.teleport_agent
